name: Supabase DB-oppsett

# Kjører supabase/setup.sql + supabase/users-and-sharing.sql mot
# Supabase-databasen (begge er idempotente).
#
# Kjøres AUTOMATISK ved push til main når en av SQL-filene (eller denne
# workflowen) endres — så en skjema-migrering aldri kan henge etter den
# deployede klienten. Det var nettopp det som brøt lister/listepunkt-synken:
# klienten sendte cards/items.collapsed før kolonnene fantes i produksjon, og
# PostgREST avviste hver skriving. Kan også startes manuelt fra fanen «Actions»
# → «Supabase DB-oppsett» → «Run workflow».
#
# Merk: main auto-deployes til produksjon (Vercel), så migreringen og klient-
# deployen skjer omtrent samtidig. Kolonnene legges til additivt («add column if
# not exists»), som ikke rører den gamle klienten; skulle deployen så vidt lede,
# lykkes skrivingene på neste synk-runde (5 s poll / realtime). concurrency-
# gruppen serialiserer kjøringene så to raske merger ikke kolliderer på DB-låser.
#
# Krever én repository-secret:
#   SUPABASE_DB_URL = tilkoblingsstrengen fra Supabase
#   (Project Settings → Database → Connection string → URI,
#    med [YOUR-PASSWORD] byttet ut med databasepassordet ditt)
#
# psql følger med på ubuntu-runneren, så ingen ekstra installasjon trengs.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/setup.sql'
      - 'supabase/users-and-sharing.sql'
      - '.github/workflows/db-setup.yml'

concurrency:
  group: db-setup
  cancel-in-progress: false

jobs:
  apply-sql:
    runs-on: ubuntu-latest
    steps:
      - name: Hent koden
        uses: actions/checkout@v4

      - name: Kjør SQL-filene mot Supabase
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::Mangler secret SUPABASE_DB_URL. Legg den til under Settings → Secrets and variables → Actions."
            exit 1
          fi
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f supabase/setup.sql
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f supabase/users-and-sharing.sql
          echo "✅ Databasen er satt opp (legacy-synk + brukere/deling)."
