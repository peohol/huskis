<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#667788" />
  <title>Huskekurv</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="locked">
  <!-- Menyknapp (☰): fast i øvre høyre hjørne av VIEWPORTET — ikke en del av
       verken gruppemenyen eller listemenyen sin flyt. Havner dermed «for gratis»
       over listemenyen på desktop (som ligger til høyre) og over gruppemenyen på
       mobil (som er det faste toppanelet der) uten skjermstørrelse-spesifikk
       DOM-plassering. -->
  <button class="menu-btn" id="menu-btn" type="button" title="Meny"
          aria-label="Åpne menyen" aria-haspopup="dialog">
    <span class="menu-bars" aria-hidden="true"></span>
    <span class="menu-badge" id="menu-badge" hidden aria-hidden="true"></span>
  </button>

  <!-- Gruppemenyen: overskrift («UNIVERS: [navn]»), knapperad («＋ Gruppe» + søppelkasse),
       og under dem gruppekortene til det aktive universet.
       Desktop: fast venstre-kolonne — kortene scroller under knapperaden (fade).
       Mobil: fast topp-panel — kortene på én horisontalt scrollende rad (uten fader). -->
  <header class="app-header" id="app-header">
    <div class="panel-top">
      <div class="panel-head">
        <span class="panel-title" id="groups-panel-title">Grupper</span>
      </div>
      <div class="panel-actions">
        <button class="btn-add" id="add-group-btn" type="button" title="Ny gruppe">＋ Gruppe</button>
        <button class="trashcan" id="groups-trash-btn" type="button"
                title="Slettede grupper – trykk for å åpne, hold og sveip for å tømme"
                aria-label="Slettede grupper" hidden>
          <span class="trashcan-icon" aria-hidden="true">🗑️</span>
          <span class="trashcan-count" id="groups-trash-count">0</span>
        </button>
      </div>
    </div>
    <div class="groups-bar" id="groups-bar" role="tablist" aria-label="Grupper"></div>
  </header>

  <main class="app-main">
    <!-- Listemenyen (verktøylinja): overskrift («GRUPPE: [navn]») og knapperad
         («＋ Liste», søppelkasse, filter). ☰ er ikke en del av denne (se toppen
         av body) — den havner likevel visuelt i dette hjørnet på desktop. -->
    <div class="toolbar">
      <div class="panel-head">
        <span class="panel-title" id="lister-panel-title">Lister</span>
      </div>
      <div class="panel-actions">
        <button class="btn-add" id="add-card-btn" type="button" title="Ny liste">＋ Liste</button>
        <button class="trashcan" id="trash-btn" type="button"
                title="Slettede lister – trykk for å åpne, hold og sveip for å tømme"
                aria-label="Slettede lister" hidden>
          <span class="trashcan-icon" aria-hidden="true">🗑️</span>
          <span class="trashcan-count" id="trash-count">0</span>
        </button>
        <div class="filter-switches" id="filter-switches" role="group" aria-label="Filtrer lister">
          <span class="filter-label" aria-hidden="true" title="Vis">👁️</span>
          <button class="switch" type="button" data-flag="k" aria-pressed="true" title="Vis kun-K-lister">K</button>
          <button class="switch" type="button" data-flag="p" aria-pressed="true" title="Vis kun-P-lister">P</button>
          <button class="switch switch-kp" type="button" data-flag="kp" aria-pressed="true" title="Vis KP-lister (både K og P)">KP</button>
        </div>
      </div>
    </div>
    <section class="board" id="board" aria-live="polite"></section>
  </main>

  <!-- Meny-modal: logg ut + universer (bytt/opprett/omdøp/slett + egen søppelkasse).
       Ligger FØR søppelkasse-modalen i DOM så søppelkassen (lik z-index) tegnes over. -->
  <div class="modal-overlay" id="menu-modal" hidden>
    <div class="modal menu-modal" role="dialog" aria-modal="true" aria-labelledby="menu-title">
      <header class="modal-head">
        <h2 id="menu-title">Meny</h2>
        <button class="icon-btn" id="menu-close" type="button" title="Lukk" aria-label="Lukk">✕</button>
      </header>
      <div class="modal-body menu-body">
        <div class="menu-account" id="menu-account" hidden>
          <span class="account-avatar" id="account-avatar" aria-hidden="true"></span>
          <span class="account-email" id="account-email"></span>
        </div>
        <button class="btn btn-ghost menu-logout" id="logout-btn" type="button" title="Logg ut">
          <span class="logout-icon" aria-hidden="true">⎋</span> Logg ut
        </button>

        <!-- Innboks: mottatte delings-invitasjoner (fase 2) -->
        <section class="menu-invites" id="menu-invites" hidden>
          <hr class="menu-divider" />
          <div class="panel-head">
            <span class="panel-title">Invitasjoner</span>
          </div>
          <div class="invite-list" id="invite-list"></div>
        </section>

        <hr class="menu-divider" />
        <div class="panel-head">
          <span class="panel-title">Universer</span>
        </div>
        <div class="uni-list" id="uni-list"></div>
        <div class="panel-actions">
          <button class="btn-add" id="add-uni-btn" type="button" title="Nytt univers">＋ Univers</button>
          <button class="trashcan" id="uni-trash-btn" type="button"
                  title="Slettede universer – trykk for å åpne, hold og sveip for å tømme"
                  aria-label="Slettede universer" hidden>
            <span class="trashcan-icon" aria-hidden="true">🗑️</span>
            <span class="trashcan-count" id="uni-trash-count">0</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Søppelkasse-modal (felles for universer/grupper/lister/elementer) -->
  <div class="modal-overlay" id="trash-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="trash-title">
      <header class="modal-head">
        <h2 id="trash-title">🗑️ Søppelkasse</h2>
        <button class="icon-btn" id="trash-close" type="button" title="Lukk" aria-label="Lukk">✕</button>
      </header>
      <div class="modal-body" id="trash-list"></div>
      <footer class="modal-foot">
        <p class="modal-note" id="trash-note"></p>
        <button class="btn btn-danger" id="trash-empty" type="button">Tøm permanent</button>
      </footer>
    </div>
  </div>

  <!-- Templates -->
  <template id="group-template">
    <div class="group-card chip" role="tab" tabindex="0">
      <button class="drag-handle group-handle" title="Dra for å endre rekkefølge" aria-label="Flytt gruppe">⠿</button>
      <span class="share-badge" hidden aria-hidden="true"></span>
      <span class="group-name chip-name" title="Klikk for å bytte gruppe"></span>
      <span class="group-count chip-count" aria-hidden="true"></span>
      <button class="icon-btn chip-share" title="Del gruppe" aria-label="Del gruppe" hidden>🔗</button>
      <button class="icon-btn group-delete" title="Slett gruppe" aria-label="Slett gruppe">✕</button>
    </div>
  </template>

  <template id="uni-template">
    <div class="uni-row chip" role="button" tabindex="0">
      <button class="drag-handle group-handle" title="Dra for å endre rekkefølge" aria-label="Flytt univers">⠿</button>
      <span class="share-badge" hidden aria-hidden="true"></span>
      <span class="uni-name chip-name" title="Klikk for å bytte univers"></span>
      <span class="uni-count chip-count" aria-hidden="true"></span>
      <button class="icon-btn chip-share" title="Del univers" aria-label="Del univers" hidden>🔗</button>
      <button class="icon-btn uni-delete" title="Slett univers" aria-label="Slett univers">✕</button>
    </div>
  </template>

  <template id="card-template">
    <article class="card" tabindex="-1">
      <header class="card-head">
        <button class="drag-handle card-handle" title="Dra for å endre rekkefølge" aria-label="Flytt liste">⣿</button>
        <span class="share-badge" hidden aria-hidden="true"></span>
        <h2 class="card-title" title="Klikk for å endre navn"></h2>
        <div class="card-switches" role="group" aria-label="Merkelapper">
          <button class="switch" type="button" data-flag="k" aria-pressed="true" title="Merkelapp K">K</button>
          <button class="switch" type="button" data-flag="p" aria-pressed="true" title="Merkelapp P">P</button>
        </div>
        <button class="icon-btn card-share" title="Del liste" aria-label="Del liste" hidden>🔗</button>
        <button class="icon-btn card-delete" title="Slett liste" aria-label="Slett liste">✕</button>
      </header>
      <ul class="items-container"></ul>
      <form class="add-item-form">
        <input class="add-item-input" type="text" placeholder="Legg til …" aria-label="Nytt element" autocomplete="off" />
        <button class="btn-add icon-only add-item-btn" type="submit" title="Legg til element" aria-label="Legg til element">＋</button>
      </form>
    </article>
  </template>

  <template id="item-template">
    <li class="item">
      <button class="drag-handle item-handle" title="Dra for å endre rekkefølge" aria-label="Flytt element">⠿</button>
      <span class="item-text" title="Klikk for å redigere"></span>
      <button class="icon-btn item-delete" title="Slett element" aria-label="Slett element">✕</button>
    </li>
  </template>

  <!-- Del-modal: eier inviterer, ser medlemmer/ventende, kaster ut, låser (fase 2).
       Mottaker ser eier + låst-status + «Forlat deling». -->
  <div class="modal-overlay" id="share-modal" hidden>
    <div class="modal share-modal" role="dialog" aria-modal="true" aria-labelledby="share-title">
      <header class="modal-head">
        <h2 id="share-title">Del</h2>
        <button class="icon-btn" id="share-close" type="button" title="Lukk" aria-label="Lukk">✕</button>
      </header>
      <div class="modal-body share-body" id="share-body"></div>
    </div>
  </div>

  <!-- Plasserings-modal: mottaker velger hvor et delt objekt skal ligge (fase 2). -->
  <div class="modal-overlay" id="place-modal" hidden>
    <div class="modal place-modal" role="dialog" aria-modal="true" aria-labelledby="place-title">
      <header class="modal-head">
        <h2 id="place-title">Velg plassering</h2>
        <button class="icon-btn" id="place-close" type="button" title="Lukk" aria-label="Lukk">✕</button>
      </header>
      <div class="modal-body" id="place-body"></div>
    </div>
  </div>

  <!-- Innlogging med konto (e-post + passord): registrering, innlogging, glemt
       passord, «sjekk innboksen» (fase 2). Vises til man er logget inn. -->
  <div class="auth-screen" id="auth-screen" hidden>
    <div class="auth-box">
      <div class="lock-brand"><span class="brand-mark">✓</span> Huskekurv</div>

      <form class="auth-form" id="auth-form" autocomplete="on">
        <h1 class="auth-title" id="auth-heading">Logg inn</h1>
        <label class="auth-field">
          <span>E-post</span>
          <input type="email" id="auth-email" autocomplete="email" required
                 placeholder="deg@eksempel.no" />
        </label>
        <label class="auth-field" id="auth-pass-field">
          <span>Passord</span>
          <input type="password" id="auth-password" autocomplete="current-password"
                 minlength="6" placeholder="Minst 6 tegn" />
        </label>
        <p class="auth-msg" id="auth-msg" role="status"></p>
        <button class="btn btn-primary auth-submit" id="auth-submit" type="submit">Logg inn</button>
        <div class="auth-links" id="auth-links">
          <button type="button" class="auth-link" data-mode="register">Ny bruker? Registrer deg</button>
          <button type="button" class="auth-link" data-mode="forgot">Glemt passord?</button>
        </div>
      </form>

      <!-- «Sjekk innboksen»-visning etter registrering / glemt-passord -->
      <div class="auth-sent" id="auth-sent" hidden>
        <div class="auth-sent-icon" aria-hidden="true">✉️</div>
        <p class="auth-sent-msg" id="auth-sent-msg"></p>
        <button class="btn btn-ghost" id="auth-sent-back" type="button">Tilbake til innlogging</button>
      </div>
    </div>
  </div>

  <!-- Innlogging: mønster-lås som splash-screen (fallback; brukes ikke i kontomodus). -->
  <div class="lock-screen" id="lock-screen" hidden>
    <div class="lock-box">
      <div class="lock-brand"><span class="brand-mark">✓</span> Huskekurv</div>
      <p class="lock-msg" id="lock-msg">Tegn mønsteret for å låse opp.</p>
      <svg class="lock-svg" id="lock-svg" viewBox="0 0 300 300" role="img"
           aria-label="Mønster-lås" xmlns="http://www.w3.org/2000/svg">
        <polyline id="lock-path" class="lock-path" points="" />
        <line id="lock-live" class="lock-live" x1="0" y1="0" x2="0" y2="0" />
        <g id="lock-nodes"></g>
      </svg>
    </div>
  </div>

  <!-- Sky-synk (Supabase). Biblioteket lastes fra CDN; config.js holder dine verdier. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <!-- Mock-backend for hermetisk to-bruker-testing: aktiveres kun med ?mock=1. -->
  <script>
    if (/[?&]mock=1/.test(location.search)) document.write('<script src="mock-backend.js"><\/script>');
  </script>
  <script src="app.js"></script>
</body>
</html>
