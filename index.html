<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#667788" />
  <title>Huskekurv</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="locked">
  <!-- Menyknapp (☰): fast i øvre høyre hjørne av VIEWPORTET — ikke en del av
       verken gruppemenyen eller listemenyen sin flyt. Havner dermed «for gratis»
       over listemenyen på desktop (som ligger til høyre) og over gruppemenyen på
       mobil (som er det faste toppanelet der) uten skjermstørrelse-spesifikk
       DOM-plassering. -->
  <button class="menu-btn" id="menu-btn" type="button" title="Meny"
          aria-label="Åpne menyen" aria-haspopup="dialog">
    <span class="menu-bars" aria-hidden="true"></span>
    <span class="menu-badge" id="menu-badge" hidden aria-hidden="true"></span>
  </button>

  <!-- Gruppemenyen: overskrift (globus-ikon + univers-navn), knapperad («＋ Gruppe» + søppelkasse),
       og under dem gruppekortene til det aktive universet.
       Desktop: fast venstre-kolonne — kortene scroller under knapperaden (fade).
       Mobil: fast topp-panel — kortene på én horisontalt scrollende rad (uten fader). -->
  <header class="app-header" id="app-header">
    <div class="panel-top">
      <div class="panel-head">
        <button class="panel-title panel-title-btn" id="uni-switch-btn" type="button"
                title="Bytt univers" aria-label="Bytt univers" aria-haspopup="true">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18"></path><path d="M12 3a14 14 0 0 1 3.8 9 14 14 0 0 1-3.8 9 14 14 0 0 1-3.8-9A14 14 0 0 1 12 3Z"></path></svg>
          <span id="groups-panel-title">Grupper</span>
        </button>
      </div>
      <div class="panel-actions">
        <button class="btn-add btn-solid btn-green" id="add-group-btn" type="button" title="Ny gruppe" aria-label="Ny gruppe">＋ <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5 19V6.5a2 2 0 0 1 2-2h3.3a2 2 0 0 1 1.6.8l1.1 1.5a2 2 0 0 0 1.6.8H19a2 2 0 0 1 2 2V19a2 2 0 0 1-2 2H5.5a2 2 0 0 1-2-2Z"></path></svg></button>
        <button class="share-btn" id="share-uni-btn" type="button" title="Del universet" aria-label="Del universet" hidden><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6.5" cy="12" r="3.2"></circle><circle cx="17.5" cy="6" r="2.3"></circle><circle cx="17.5" cy="18" r="2.3"></circle><path d="m9.4 10.4 5.3-3"></path><path d="m9.4 13.6 5.3 3"></path></svg><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18"></path><path d="M12 3a14 14 0 0 1 3.8 9 14 14 0 0 1-3.8 9 14 14 0 0 1-3.8-9A14 14 0 0 1 12 3Z"></path></svg></button>
        <button class="trashcan" id="groups-trash-btn" type="button"
                title="Slettede grupper – trykk for å åpne, hold og sveip for å tømme"
                aria-label="Slettede grupper" hidden>
          <svg class="icon trashcan-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4.5 7.5h15"></path><path d="M9.5 7.5V6a2.5 2.5 0 0 1 5 0v1.5"></path><path d="M6.3 7.5l.9 11a2 2 0 0 0 2 1.9h5.6a2 2 0 0 0 2-1.9l.9-11"></path><path d="M9.7 11v6"></path><path d="M12 11v6"></path><path d="M14.3 11v6"></path></svg>
          <span class="trashcan-count" id="groups-trash-count">0</span>
        </button>
      </div>
    </div>
    <div class="groups-bar" id="groups-bar" role="tablist" aria-label="Grupper"></div>
  </header>

  <main class="app-main">
    <!-- Listemenyen (verktøylinja): overskrift (mappe-ikon + gruppe-navn) og knapperad
         («＋ Liste», søppelkasse, filter). ☰ er ikke en del av denne (se toppen
         av body) — den havner likevel visuelt i dette hjørnet på desktop. -->
    <div class="toolbar">
      <div class="panel-head">
        <button class="panel-title panel-title-btn" id="group-switch-btn" type="button"
                title="Bytt gruppe" aria-label="Bytt gruppe" aria-haspopup="true">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5 19V6.5a2 2 0 0 1 2-2h3.3a2 2 0 0 1 1.6.8l1.1 1.5a2 2 0 0 0 1.6.8H19a2 2 0 0 1 2 2V19a2 2 0 0 1-2 2H5.5a2 2 0 0 1-2-2Z"></path></svg>
          <span id="lister-panel-title">Lister</span>
        </button>
      </div>
      <div class="panel-actions">
        <button class="btn-add btn-solid btn-green" id="add-card-btn" type="button" title="Ny liste" aria-label="Ny liste">＋ <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="4.5"></rect><circle cx="8" cy="8.5" r="0.7" fill="currentColor" stroke="none"></circle><circle cx="8" cy="12" r="0.7" fill="currentColor" stroke="none"></circle><circle cx="8" cy="15.5" r="0.7" fill="currentColor" stroke="none"></circle><path d="M11.5 8.5h5.5"></path><path d="M11.5 12h5.5"></path><path d="M11.5 15.5h5.5"></path></svg></button>
        <button class="share-btn" id="share-group-btn" type="button" title="Del gruppen" aria-label="Del gruppen" hidden><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6.5" cy="12" r="3.2"></circle><circle cx="17.5" cy="6" r="2.3"></circle><circle cx="17.5" cy="18" r="2.3"></circle><path d="m9.4 10.4 5.3-3"></path><path d="m9.4 13.6 5.3 3"></path></svg><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5 19V6.5a2 2 0 0 1 2-2h3.3a2 2 0 0 1 1.6.8l1.1 1.5a2 2 0 0 0 1.6.8H19a2 2 0 0 1 2 2V19a2 2 0 0 1-2 2H5.5a2 2 0 0 1-2-2Z"></path></svg></button>
        <button class="trashcan" id="trash-btn" type="button"
                title="Slettede lister – trykk for å åpne, hold og sveip for å tømme"
                aria-label="Slettede lister" hidden>
          <svg class="icon trashcan-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4.5 7.5h15"></path><path d="M9.5 7.5V6a2.5 2.5 0 0 1 5 0v1.5"></path><path d="M6.3 7.5l.9 11a2 2 0 0 0 2 1.9h5.6a2 2 0 0 0 2-1.9l.9-11"></path><path d="M9.7 11v6"></path><path d="M12 11v6"></path><path d="M14.3 11v6"></path></svg>
          <span class="trashcan-count" id="trash-count">0</span>
        </button>
        <div class="filter-switches" id="filter-switches" role="group" aria-label="Filtrer lister">
          <span class="filter-label" aria-hidden="true" title="Vis"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z"></path><circle cx="12" cy="12" r="3"></circle></svg></span>
          <button class="switch" type="button" data-flag="mine" aria-pressed="true"
                  aria-label="Mine"
                  title="Vis mine lister (hold inne for å vise kun mine)"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="3.4"></circle><path d="M5.5 20a6.5 6.5 0 0 1 13 0"></path></svg></button>
          <button class="switch" type="button" data-flag="delt" aria-pressed="true"
                  aria-label="Delte"
                  title="Vis delte lister (hold inne for å vise kun delte)"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="7.8" r="3.1"></circle><path d="M6.7 18.6a5.3 5.2 0 0 1 10.6 0"></path><circle cx="4.7" cy="10.3" r="1.95"></circle><path d="M1.8 18a3.3 3.2 0 0 1 3.3-2.7"></path><circle cx="19.3" cy="10.3" r="1.95"></circle><path d="M22.2 18a3.3 3.2 0 0 0-3.3-2.7"></path></svg></button>
        </div>
      </div>
    </div>
    <section class="board" id="board" aria-live="polite"></section>
  </main>

  <!-- Meny-modal: logg ut + universer (bytt/opprett/omdøp/slett + egen søppelkasse).
       Ligger FØR søppelkasse-modalen i DOM så søppelkassen (lik z-index) tegnes over. -->
  <div class="modal-overlay" id="menu-modal" hidden>
    <div class="modal menu-modal" role="dialog" aria-modal="true" aria-labelledby="menu-title">
      <header class="modal-head">
        <h2 id="menu-title">Meny</h2>
        <button class="icon-btn" id="menu-close" type="button" title="Lukk" aria-label="Lukk">✕</button>
      </header>
      <div class="modal-body menu-body">
        <div class="menu-account" id="menu-account" hidden>
          <span class="account-avatar" id="account-avatar" aria-hidden="true"></span>
          <span class="account-email" id="account-email"></span>
        </div>
        <button class="btn btn-solid btn-red btn-small menu-logout" id="logout-btn" type="button" title="Logg ut">
          <svg class="icon logout-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 3H6a2.5 2.5 0 0 0-2.5 2.5v13A2.5 2.5 0 0 0 6 21h3"></path><path d="M21 12H10"></path><path d="M17.5 8.5 21 12l-3.5 3.5"></path></svg>
          Logg ut
        </button>

        <!-- Innboks: mottatte delings-invitasjoner (fase 2) -->
        <section class="menu-invites" id="menu-invites" hidden>
          <hr class="menu-divider" />
          <div class="panel-head">
            <span class="panel-title">Invitasjoner</span>
          </div>
          <div class="invite-list" id="invite-list"></div>
        </section>

        <hr class="menu-divider" />
        <div class="panel-head">
          <span class="panel-title">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18"></path><path d="M12 3a14 14 0 0 1 3.8 9 14 14 0 0 1-3.8 9 14 14 0 0 1-3.8-9A14 14 0 0 1 12 3Z"></path></svg>
            <span>Universer</span>
          </span>
        </div>
        <div class="uni-list" id="uni-list"></div>
        <div class="panel-actions">
          <button class="btn-add btn-solid btn-green" id="add-uni-btn" type="button" title="Nytt univers" aria-label="Nytt univers">＋ <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18"></path><path d="M12 3a14 14 0 0 1 3.8 9 14 14 0 0 1-3.8 9 14 14 0 0 1-3.8-9A14 14 0 0 1 12 3Z"></path></svg></button>
          <button class="trashcan" id="uni-trash-btn" type="button"
                  title="Slettede universer – trykk for å åpne, hold og sveip for å tømme"
                  aria-label="Slettede universer" hidden>
            <svg class="icon trashcan-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4.5 7.5h15"></path><path d="M9.5 7.5V6a2.5 2.5 0 0 1 5 0v1.5"></path><path d="M6.3 7.5l.9 11a2 2 0 0 0 2 1.9h5.6a2 2 0 0 0 2-1.9l.9-11"></path><path d="M9.7 11v6"></path><path d="M12 11v6"></path><path d="M14.3 11v6"></path></svg>
            <span class="trashcan-count" id="uni-trash-count">0</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Søppelkasse-modal (felles for universer/grupper/lister/elementer) -->
  <div class="modal-overlay" id="trash-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="trash-title">
      <header class="modal-head">
        <h2 id="trash-title">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4.5 7.5h15"></path><path d="M9.5 7.5V6a2.5 2.5 0 0 1 5 0v1.5"></path><path d="M6.3 7.5l.9 11a2 2 0 0 0 2 1.9h5.6a2 2 0 0 0 2-1.9l.9-11"></path><path d="M9.7 11v6"></path><path d="M12 11v6"></path><path d="M14.3 11v6"></path></svg>
          <span id="trash-title-text">Søppelkasse</span>
        </h2>
        <button class="icon-btn" id="trash-close" type="button" title="Lukk" aria-label="Lukk">✕</button>
      </header>
      <div class="modal-body" id="trash-list"></div>
      <footer class="modal-foot">
        <p class="modal-note" id="trash-note"></p>
        <button class="btn btn-solid btn-red" id="trash-empty" type="button">Tøm permanent</button>
      </footer>
    </div>
  </div>

  <!-- Univers-/gruppebytter: popover (desktop) / sentrert modal (mobil), åpnet
       fra panel-title-knappene (globus-/mappe-ikon + navn) i gruppemenyen/
       listemenyen. Kun bytte — ingen omdøping/sletting/rekkefølge herfra
       (det skjer fortsatt i meny-modalen/gruppemenyen selv). -->
  <div class="switcher-overlay" id="uni-switcher" hidden>
    <div class="switcher-panel" id="uni-switcher-panel" role="listbox" aria-label="Bytt univers" tabindex="-1"></div>
  </div>
  <div class="switcher-overlay" id="group-switcher" hidden>
    <div class="switcher-panel" id="group-switcher-panel" role="listbox" aria-label="Bytt gruppe" tabindex="-1"></div>
  </div>

  <!-- Ansvarlig-velger for elementer i delte lister: popover (desktop) / modal
       (mobil), à la univers-/gruppebytteren. Bygges i openResponsible(). -->
  <div class="switcher-overlay" id="resp-switcher" hidden>
    <div class="switcher-panel resp-panel" id="resp-switcher-panel" role="listbox" aria-label="Velg ansvarlig" tabindex="-1"></div>
  </div>

  <!-- Templates -->
  <template id="group-template">
    <div class="group-card chip" role="tab" tabindex="0">
      <button class="drag-handle group-handle" title="Dra eller bruk piltaster for å endre rekkefølge" aria-label="Flytt gruppe"></button>
      <span class="share-badge" hidden aria-hidden="true"></span>
      <span class="group-name chip-name" title="Klikk for å bytte gruppe"></span>
      <span class="group-count chip-count" aria-hidden="true"></span>
      <button class="icon-btn group-delete" title="Slett gruppe" aria-label="Slett gruppe">✕</button>
    </div>
  </template>

  <template id="uni-template">
    <div class="uni-row chip" role="button" tabindex="0">
      <button class="drag-handle group-handle" title="Dra eller bruk piltaster for å endre rekkefølge" aria-label="Flytt univers"></button>
      <span class="share-badge" hidden aria-hidden="true"></span>
      <span class="uni-name chip-name" title="Klikk for å bytte univers"></span>
      <span class="uni-count chip-count" aria-hidden="true"></span>
      <button class="icon-btn uni-delete" title="Slett univers" aria-label="Slett univers">✕</button>
    </div>
  </template>

  <template id="card-template">
    <article class="card" tabindex="-1">
      <header class="card-head">
        <button class="drag-handle card-handle" title="Dra eller bruk piltaster for å endre rekkefølge" aria-label="Flytt liste"></button>
        <span class="share-badge" hidden aria-hidden="true"></span>
        <h2 class="card-title" title="Klikk for å endre navn"></h2>
        <button class="card-share" title="Del liste" aria-label="Del liste" hidden><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6.5" cy="12" r="3.2"></circle><circle cx="17.5" cy="6" r="2.3"></circle><circle cx="17.5" cy="18" r="2.3"></circle><path d="m9.4 10.4 5.3-3"></path><path d="m9.4 13.6 5.3 3"></path></svg><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="4.5"></rect><circle cx="8" cy="8.5" r="0.7" fill="currentColor" stroke="none"></circle><circle cx="8" cy="12" r="0.7" fill="currentColor" stroke="none"></circle><circle cx="8" cy="15.5" r="0.7" fill="currentColor" stroke="none"></circle><path d="M11.5 8.5h5.5"></path><path d="M11.5 12h5.5"></path><path d="M11.5 15.5h5.5"></path></svg></button>
        <button class="icon-btn card-delete" title="Slett liste" aria-label="Slett liste">✕</button>
      </header>
      <ul class="items-container"></ul>
      <div class="items-done-wrap" hidden>
        <div class="done-divider"><span>Utført</span></div>
        <ul class="items-done"></ul>
      </div>
      <form class="add-item-form">
        <input class="add-item-input" type="text" placeholder="Legg til …" aria-label="Nytt element" autocomplete="off" />
        <button class="btn-add btn-solid btn-green icon-only add-item-btn" type="submit" title="Legg til element" aria-label="Legg til element">＋</button>
      </form>
    </article>
  </template>

  <template id="item-template">
    <li class="item">
      <button class="drag-handle item-handle" title="Dra eller bruk piltaster for å endre rekkefølge" aria-label="Flytt element"></button>
      <button class="item-check" type="button" title="Merk som gjort" aria-label="Merk som gjort" aria-pressed="false"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12.5l4 4L19 6.5"></path></svg></button>
      <span class="item-text" title="Klikk for å redigere"></span>
      <button class="item-resp" type="button" hidden title="Velg ansvarlig" aria-label="Velg ansvarlig"></button>
      <button class="icon-btn item-delete" title="Slett element" aria-label="Slett element">✕</button>
    </li>
  </template>

  <!-- Del-modal: eier inviterer, ser medlemmer/ventende, kaster ut, låser (fase 2).
       Mottaker ser eier + låst-status + «Forlat deling». -->
  <div class="modal-overlay" id="share-modal" hidden>
    <div class="modal share-modal" role="dialog" aria-modal="true" aria-labelledby="share-title">
      <header class="modal-head">
        <h2 id="share-title">Del</h2>
        <button class="icon-btn" id="share-close" type="button" title="Lukk" aria-label="Lukk">✕</button>
      </header>
      <div class="modal-body share-body" id="share-body"></div>
    </div>
  </div>

  <!-- Plasserings-modal: mottaker velger hvor et delt objekt skal ligge (fase 2). -->
  <div class="modal-overlay" id="place-modal" hidden>
    <div class="modal place-modal" role="dialog" aria-modal="true" aria-labelledby="place-title">
      <header class="modal-head">
        <h2 id="place-title">Velg plassering</h2>
        <button class="icon-btn" id="place-close" type="button" title="Lukk" aria-label="Lukk">✕</button>
      </header>
      <div class="modal-body" id="place-body"></div>
    </div>
  </div>

  <!-- Felles bekreftelses-modal (erstatter native confirm()): app-stilt ja/nei. -->
  <div class="modal-overlay" id="confirm-modal" hidden>
    <div class="modal confirm-modal" role="alertdialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-msg">
      <header class="modal-head">
        <h2 id="confirm-title">Bekreft</h2>
      </header>
      <div class="modal-body">
        <p class="confirm-msg" id="confirm-msg"></p>
      </div>
      <footer class="modal-foot confirm-foot">
        <button class="btn btn-ghost" id="confirm-cancel" type="button">Avbryt</button>
        <button class="btn btn-solid btn-red" id="confirm-ok" type="button">OK</button>
      </footer>
    </div>
  </div>

  <!-- Innlogging med konto (e-post + passord): registrering, innlogging, glemt
       passord, «sjekk innboksen» (fase 2). Vises til man er logget inn. -->
  <div class="auth-screen" id="auth-screen" hidden>
    <div class="auth-box">
      <div class="lock-brand"><span class="brand-mark"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7.5 18a4.5 4.5 0 0 1-.9-8.9 5.5 5.5 0 0 1 10.6-1.3A5.3 5.3 0 0 1 16.5 18Z"></path><circle cx="8.5" cy="13" r="1"></circle><path d="M11 13h5"></path></svg></span> Huskekurv</div>

      <form class="auth-form" id="auth-form" autocomplete="on">
        <h1 class="auth-title">
          <span id="auth-heading-icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h3a2.5 2.5 0 0 1 2.5 2.5v13A2.5 2.5 0 0 1 18 21h-3"></path><path d="M3 12h11"></path><path d="M10.5 8.5 14 12l-3.5 3.5"></path></svg></span>
          <span id="auth-heading">Logg inn</span>
        </h1>
        <div class="auth-name-row" id="auth-name-fields" hidden>
          <label class="auth-field">
            <span>Fornavn</span>
            <input class="field" type="text" id="auth-first-name" autocomplete="given-name"
                   placeholder="Fornavn" />
          </label>
          <label class="auth-field">
            <span>Etternavn</span>
            <input class="field" type="text" id="auth-last-name" autocomplete="family-name"
                   placeholder="Etternavn" />
          </label>
        </div>
        <label class="auth-field">
          <span>E-post</span>
          <input class="field" type="email" id="auth-email" autocomplete="email" required
                 placeholder="deg@eksempel.no" />
        </label>
        <label class="auth-field" id="auth-pass-field">
          <span>Passord</span>
          <input class="field" type="password" id="auth-password" autocomplete="current-password"
                 minlength="6" placeholder="Minst 6 tegn" />
        </label>
        <p class="auth-msg" id="auth-msg" role="status"></p>
        <button class="btn btn-solid btn-green auth-submit" id="auth-submit" type="submit">Logg inn</button>
        <div class="auth-links" id="auth-links">
          <button type="button" class="auth-link" data-mode="register">Ny bruker? Registrer deg</button>
          <button type="button" class="auth-link" data-mode="forgot">Glemt passord?</button>
        </div>
      </form>

      <!-- «Sjekk innboksen»-visning etter registrering / glemt-passord -->
      <div class="auth-sent" id="auth-sent" hidden>
        <div class="auth-sent-icon" aria-hidden="true"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"></rect><path d="m3.5 7 7.2 5.6a2 2 0 0 0 2.6 0L20.5 7"></path></svg></div>
        <p class="auth-sent-msg" id="auth-sent-msg"></p>
        <button class="btn btn-ghost" id="auth-sent-back" type="button">Tilbake til innlogging</button>
      </div>
    </div>
  </div>

  <!-- Innlogging: mønster-lås som splash-screen (fallback; brukes ikke i kontomodus). -->
  <div class="lock-screen" id="lock-screen" hidden>
    <div class="lock-box">
      <div class="lock-brand"><span class="brand-mark"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7.5 18a4.5 4.5 0 0 1-.9-8.9 5.5 5.5 0 0 1 10.6-1.3A5.3 5.3 0 0 1 16.5 18Z"></path><circle cx="8.5" cy="13" r="1"></circle><path d="M11 13h5"></path></svg></span> Huskekurv</div>
      <p class="lock-msg" id="lock-msg">Tegn mønsteret for å låse opp.</p>
      <svg class="lock-svg" id="lock-svg" viewBox="0 0 300 300" role="img"
           aria-label="Mønster-lås" xmlns="http://www.w3.org/2000/svg">
        <polyline id="lock-path" class="lock-path" points="" />
        <line id="lock-live" class="lock-live" x1="0" y1="0" x2="0" y2="0" />
        <g id="lock-nodes"></g>
      </svg>
    </div>
  </div>

  <!-- Sky-synk (Supabase). Biblioteket lastes fra CDN; config.js holder dine verdier. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <!-- Mock-backend for hermetisk to-bruker-testing: aktiveres kun med ?mock=1. -->
  <script>
    if (/[?&]mock=1/.test(location.search)) document.write('<script src="mock-backend.js"><\/script>');
  </script>
  <script src="icons.js"></script>
  <script src="app.js"></script>
</body>
</html>
