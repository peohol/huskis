<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#667788" />
  <title>Huskekurv</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="locked">
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark">🧺</span>
      <h1>Huskekurv</h1>
    </div>
    <nav class="tabs" id="tabs" role="tablist" aria-label="Listetyper">
      <button class="tab" data-tab="huskelister" role="tab">💭 Huskelister</button>
      <button class="tab" data-tab="handlelister" role="tab">🛒 Handlelister</button>
    </nav>
  </header>

  <main class="app-main">
    <div class="toolbar">
      <button class="btn btn-primary" id="add-card-btn" type="button">
        <span class="plus">＋</span> Ny kategori
      </button>
      <button class="btn btn-ghost" id="trash-btn" type="button" title="Vis papirkurv">
        <span class="trash-icon" aria-hidden="true">🗑️</span> Papirkurv
        <span class="trash-count" id="trash-count">0</span>
      </button>
      <div class="filter-switches" id="filter-switches" role="group" aria-label="Filtrer kategorier">
        <span class="filter-label">Vis</span>
        <button class="switch" type="button" data-flag="k" aria-pressed="true" title="Vis kun-K-kategorier">K</button>
        <button class="switch" type="button" data-flag="p" aria-pressed="true" title="Vis kun-P-kategorier">P</button>
        <button class="switch switch-kp" type="button" data-flag="kp" aria-pressed="true" title="Vis KP-kategorier (både K og P)">KP</button>
      </div>
      <button class="btn btn-ghost btn-logout" id="logout-btn" type="button" title="Logg ut">
        <span class="logout-icon" aria-hidden="true">⎋</span> Logg ut
      </button>
    </div>
    <section class="board" id="board" aria-live="polite"></section>
  </main>

  <!-- Papirkurv-modal -->
  <div class="modal-overlay" id="trash-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="trash-title">
      <header class="modal-head">
        <h2 id="trash-title">🗑️ Papirkurv</h2>
        <button class="icon-btn" id="trash-close" type="button" title="Lukk" aria-label="Lukk">✕</button>
      </header>
      <div class="modal-body" id="trash-list"></div>
      <footer class="modal-foot">
        <p class="modal-note">Slettede kategorier ligger her til du tømmer papirkurven.</p>
        <button class="btn btn-danger" id="trash-empty" type="button">Tøm papirkurv</button>
      </footer>
    </div>
  </div>

  <!-- Templates -->
  <template id="card-template">
    <article class="card" tabindex="-1">
      <header class="card-head">
        <button class="drag-handle card-handle" title="Dra for å endre rekkefølge" aria-label="Flytt kategori">⣿</button>
        <h2 class="card-title" title="Klikk for å endre navn"></h2>
        <div class="card-switches" role="group" aria-label="Merkelapper">
          <button class="switch" type="button" data-flag="k" aria-pressed="true" title="Merkelapp K">K</button>
          <button class="switch" type="button" data-flag="p" aria-pressed="true" title="Merkelapp P">P</button>
        </div>
        <button class="icon-btn card-delete" title="Slett kategori" aria-label="Slett kategori">✕</button>
      </header>
      <ul class="items-container"></ul>
      <form class="add-item-form">
        <input class="add-item-input" type="text" placeholder="Legg til …" aria-label="Nytt element" autocomplete="off" />
        <button class="icon-btn add-item-btn" type="submit" title="Legg til element" aria-label="Legg til element">＋</button>
      </form>
    </article>
  </template>

  <template id="item-template">
    <li class="item">
      <button class="drag-handle item-handle" title="Dra for å endre rekkefølge" aria-label="Flytt element">⠿</button>
      <span class="item-text" title="Klikk for å redigere"></span>
      <button class="icon-btn item-delete" title="Slett element" aria-label="Slett element">✕</button>
    </li>
  </template>

  <!-- Innlogging: mønster-lås som splash-screen. Vises til riktig mønster er tegnet. -->
  <div class="lock-screen" id="lock-screen" hidden>
    <div class="lock-box">
      <div class="lock-brand"><span class="brand-mark">✓</span> Huskekurv</div>
      <p class="lock-msg" id="lock-msg">Tegn mønsteret for å låse opp.</p>
      <svg class="lock-svg" id="lock-svg" viewBox="0 0 300 300" role="img"
           aria-label="Mønster-lås" xmlns="http://www.w3.org/2000/svg">
        <polyline id="lock-path" class="lock-path" points="" />
        <line id="lock-live" class="lock-live" x1="0" y1="0" x2="0" y2="0" />
        <g id="lock-nodes"></g>
      </svg>
    </div>
  </div>

  <!-- Sky-synk (Supabase). Biblioteket lastes fra CDN; config.js holder dine verdier. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
