<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#667788" />
  <title>Huskis</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="locked">
  <!-- Kontoknapp: fast i øvre høyre hjørne av VIEWPORTET — utenfor toppmenyens
       flyt, alltid synlig. Åpner konto-modalen; badgen viser ventende
       invitasjoner. -->
  <button class="account-btn" id="account-btn" type="button" title="Konto"
          aria-label="Åpne kontoen" aria-haspopup="dialog">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="3.4" fill="#85adad"></circle><path d="M5.5 20a6.5 6.5 0 0 1 13 0" fill="#85adad"></path></svg>
    <span class="menu-badge" id="account-badge" hidden aria-hidden="true"></span>
  </button>

  <!-- Toppmenyen: breadcrumb-navigasjon (🌐 univers › 📁 gruppe — begge er
       knapper som åpner sin modal) og listefunksjonene («＋ Liste», søppelkasse,
       filter) på raden under. All navigering/redigering/deling av universer og
       grupper skjer i modalene, ikke her. -->
  <header class="topbar" id="topbar">
    <nav class="breadcrumb" aria-label="Du er her">
      <button class="crumb-btn" id="uni-crumb" type="button"
              title="Univers – bytt, rediger og del" aria-haspopup="dialog">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12A9 9 0 0 1 12 3A14 14 0 0 0 8.2 12Z" fill="#ad8585" stroke="none"></path><path d="M8.2 12A14 14 0 0 1 12 3A14 14 0 0 1 15.8 12Z" fill="#adad85" stroke="none"></path><path d="M15.8 12A14 14 0 0 0 12 3A9 9 0 0 1 21 12Z" fill="#85ad85" stroke="none"></path><path d="M3 12A9 9 0 0 0 12 21A14 14 0 0 1 8.2 12Z" fill="#85adad" stroke="none"></path><path d="M8.2 12A14 14 0 0 0 12 21A14 14 0 0 0 15.8 12Z" fill="#8585ad" stroke="none"></path><path d="M15.8 12A14 14 0 0 1 12 21A9 9 0 0 0 21 12Z" fill="#ad85ad" stroke="none"></path><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18"></path><path d="M12 3a14 14 0 0 1 3.8 9 14 14 0 0 1-3.8 9 14 14 0 0 1-3.8-9A14 14 0 0 1 12 3Z"></path></svg>
        <span class="crumb-name" id="crumb-uni-name">Univers</span>
      </button>
      <span class="crumb-sep" aria-hidden="true">›</span>
      <button class="crumb-btn" id="group-crumb" type="button"
              title="Gruppe – bytt, rediger og del" aria-haspopup="dialog">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5 19V6.5a2 2 0 0 1 2-2h3.3a2 2 0 0 1 1.6.8l1.1 1.5a2 2 0 0 0 1.6.8H19a2 2 0 0 1 2 2V19a2 2 0 0 1-2 2H5.5a2 2 0 0 1-2-2Z" fill="#adad85"></path></svg>
        <span class="crumb-name" id="crumb-group-name">Gruppe</span>
      </button>
    </nav>
    <div class="panel-actions toolbar">
        <button class="btn-add btn-solid btn-green" id="add-card-btn" type="button" title="Ny liste" aria-label="Ny liste"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4.5v15"></path><path d="M4.5 12h15"></path></svg> <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="4.5" fill="#ffffff"></rect><circle cx="8" cy="8.5" r="0.7" fill="#111" stroke="none"></circle><circle cx="8" cy="12" r="0.7" fill="#111" stroke="none"></circle><circle cx="8" cy="15.5" r="0.7" fill="#111" stroke="none"></circle><path d="M11.5 8.5h5.5"></path><path d="M11.5 12h5.5"></path><path d="M11.5 15.5h5.5"></path></svg></button>
        <button class="trashcan" id="trash-btn" type="button"
                title="Slettede lister – trykk for å åpne, hold og sveip for å tømme"
                aria-label="Slettede lister" hidden>
          <svg class="icon trashcan-icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.3 7.5l.9 11a2 2 0 0 0 2 1.9h5.6a2 2 0 0 0 2-1.9l.9-11" fill="#c0c4c9" stroke="none"></path><path d="M4.5 7.5h15"></path><path d="M9.5 7.5V6a2.5 2.5 0 0 1 5 0v1.5"></path><path d="M6.3 7.5l.9 11a2 2 0 0 0 2 1.9h5.6a2 2 0 0 0 2-1.9l.9-11"></path><path d="M9.7 11v6"></path><path d="M12 11v6"></path><path d="M14.3 11v6"></path></svg>
          <span class="trashcan-count" id="trash-count">0</span>
        </button>
        <div class="filter-switches" id="filter-switches" role="group" aria-label="Filtrer lister">
          <span class="filter-label" aria-hidden="true" title="Vis"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z" fill="#ffffff"></path><circle cx="12" cy="12" r="3" fill="#111" stroke="none"></circle><circle cx="12" cy="12" r="3"></circle></svg></span>
          <button class="switch" type="button" data-flag="mine" aria-pressed="true"
                  aria-label="Mine"
                  title="Vis mine lister (hold inne for å vise kun mine)"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="3.4" fill="#85adad"></circle><path d="M5.5 20a6.5 6.5 0 0 1 13 0" fill="#85adad"></path></svg></button>
          <button class="switch" type="button" data-flag="delt" aria-pressed="true"
                  aria-label="Delte"
                  title="Vis delte lister (hold inne for å vise kun delte)"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="4.7" cy="10.3" r="1.95" fill="#adad85"></circle><path d="M2.1 17.6a2.6 2.6 0 0 1 5.2 0" fill="#adad85"></path><circle cx="19.3" cy="10.3" r="1.95" fill="#85ad85"></circle><path d="M16.7 17.6a2.6 2.6 0 0 1 5.2 0" fill="#85ad85"></path><circle cx="12" cy="7.8" r="3.1" fill="#ad8585"></circle><path d="M6.7 18.6a5.3 5.2 0 0 1 10.6 0" fill="#ad8585"></path></svg></button>
        </div>
    </div>
  </header>

  <main class="app-main">
    <section class="board" id="board" aria-live="polite"></section>
  </main>

  <!-- Univers-modal (åpnes fra 🌐-breadcrumben): aktuelt univers + del-knapp
       øverst, deretter alle universene (bytt/opprett/omdøp/slett/rekkefølge)
       og univers-søppelkassen. Ligger FØR søppelkasse-modalen i DOM så
       søppelkassen (lik z-index) tegnes over. -->
  <div class="modal-overlay" id="uni-modal" hidden>
    <div class="modal menu-modal" role="dialog" aria-modal="true" aria-labelledby="uni-modal-title">
      <header class="modal-head">
        <h2 id="uni-modal-title"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12A9 9 0 0 1 12 3A14 14 0 0 0 8.2 12Z" fill="#ad8585" stroke="none"></path><path d="M8.2 12A14 14 0 0 1 12 3A14 14 0 0 1 15.8 12Z" fill="#adad85" stroke="none"></path><path d="M15.8 12A14 14 0 0 0 12 3A9 9 0 0 1 21 12Z" fill="#85ad85" stroke="none"></path><path d="M3 12A9 9 0 0 0 12 21A14 14 0 0 1 8.2 12Z" fill="#85adad" stroke="none"></path><path d="M8.2 12A14 14 0 0 0 12 21A14 14 0 0 0 15.8 12Z" fill="#8585ad" stroke="none"></path><path d="M15.8 12A14 14 0 0 1 12 21A9 9 0 0 0 21 12Z" fill="#ad85ad" stroke="none"></path><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18"></path><path d="M12 3a14 14 0 0 1 3.8 9 14 14 0 0 1-3.8 9 14 14 0 0 1-3.8-9A14 14 0 0 1 12 3Z"></path></svg><span>Univers</span></h2>
        <button class="icon-btn" id="uni-modal-close" type="button" title="Lukk" aria-label="Lukk"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.5 6.5 17.5 17.5"></path><path d="M17.5 6.5 6.5 17.5"></path></svg></button>
      </header>
      <div class="modal-body menu-body" id="uni-modal-body">
        <!-- Aktuelt univers: navn på chip-farget flate + del-knapp rett under. -->
        <div class="modal-current" id="uni-current" hidden>
          <span class="current-label">Du er i</span>
          <span class="chip current-chip" id="uni-current-chip">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12A9 9 0 0 1 12 3A14 14 0 0 0 8.2 12Z" fill="#ad8585" stroke="none"></path><path d="M8.2 12A14 14 0 0 1 12 3A14 14 0 0 1 15.8 12Z" fill="#adad85" stroke="none"></path><path d="M15.8 12A14 14 0 0 0 12 3A9 9 0 0 1 21 12Z" fill="#85ad85" stroke="none"></path><path d="M3 12A9 9 0 0 0 12 21A14 14 0 0 1 8.2 12Z" fill="#85adad" stroke="none"></path><path d="M8.2 12A14 14 0 0 0 12 21A14 14 0 0 0 15.8 12Z" fill="#8585ad" stroke="none"></path><path d="M15.8 12A14 14 0 0 1 12 21A9 9 0 0 0 21 12Z" fill="#ad85ad" stroke="none"></path><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18"></path><path d="M12 3a14 14 0 0 1 3.8 9 14 14 0 0 1-3.8 9 14 14 0 0 1-3.8-9A14 14 0 0 1 12 3Z"></path></svg>
            <span class="chip-name" id="uni-current-name"></span>
          </span>
          <button class="share-btn" id="share-uni-btn" type="button" title="Del universet" aria-label="Del universet" hidden><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6.5" cy="12" r="3.2" fill="#ad8585"></circle><circle cx="17.5" cy="6" r="2.3" fill="#adad85"></circle><circle cx="17.5" cy="18" r="2.3" fill="#85ad85"></circle><path d="m9.4 10.4 5.3-3"></path><path d="m9.4 13.6 5.3 3"></path></svg><span>Del universet</span></button>
        </div>
        <hr class="menu-divider" />
        <div class="panel-head">
          <span class="panel-title">Alle universer</span>
        </div>
        <div class="modal-list" id="uni-list"></div>
        <div class="panel-actions">
          <button class="btn-add btn-solid btn-green" id="add-uni-btn" type="button" title="Nytt univers" aria-label="Nytt univers"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4.5v15"></path><path d="M4.5 12h15"></path></svg> <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12A9 9 0 0 1 12 3A14 14 0 0 0 8.2 12Z" fill="#ad8585" stroke="none"></path><path d="M8.2 12A14 14 0 0 1 12 3A14 14 0 0 1 15.8 12Z" fill="#adad85" stroke="none"></path><path d="M15.8 12A14 14 0 0 0 12 3A9 9 0 0 1 21 12Z" fill="#85ad85" stroke="none"></path><path d="M3 12A9 9 0 0 0 12 21A14 14 0 0 1 8.2 12Z" fill="#85adad" stroke="none"></path><path d="M8.2 12A14 14 0 0 0 12 21A14 14 0 0 0 15.8 12Z" fill="#8585ad" stroke="none"></path><path d="M15.8 12A14 14 0 0 1 12 21A9 9 0 0 0 21 12Z" fill="#ad85ad" stroke="none"></path><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18"></path><path d="M12 3a14 14 0 0 1 3.8 9 14 14 0 0 1-3.8 9 14 14 0 0 1-3.8-9A14 14 0 0 1 12 3Z"></path></svg></button>
          <button class="trashcan" id="uni-trash-btn" type="button"
                  title="Slettede universer – trykk for å åpne, hold og sveip for å tømme"
                  aria-label="Slettede universer" hidden>
            <svg class="icon trashcan-icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.3 7.5l.9 11a2 2 0 0 0 2 1.9h5.6a2 2 0 0 0 2-1.9l.9-11" fill="#c0c4c9" stroke="none"></path><path d="M4.5 7.5h15"></path><path d="M9.5 7.5V6a2.5 2.5 0 0 1 5 0v1.5"></path><path d="M6.3 7.5l.9 11a2 2 0 0 0 2 1.9h5.6a2 2 0 0 0 2-1.9l.9-11"></path><path d="M9.7 11v6"></path><path d="M12 11v6"></path><path d="M14.3 11v6"></path></svg>
            <span class="trashcan-count" id="uni-trash-count">0</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Gruppe-modal (åpnes fra 📁-breadcrumben): aktuell gruppe + del-knapp
       øverst, deretter alle gruppene i det aktive universet + gruppe-
       søppelkassen. Samme oppbygning som univers-modalen. -->
  <div class="modal-overlay" id="group-modal" hidden>
    <div class="modal menu-modal" role="dialog" aria-modal="true" aria-labelledby="group-modal-title">
      <header class="modal-head">
        <h2 id="group-modal-title"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5 19V6.5a2 2 0 0 1 2-2h3.3a2 2 0 0 1 1.6.8l1.1 1.5a2 2 0 0 0 1.6.8H19a2 2 0 0 1 2 2V19a2 2 0 0 1-2 2H5.5a2 2 0 0 1-2-2Z" fill="#adad85"></path></svg><span>Gruppe</span></h2>
        <button class="icon-btn" id="group-modal-close" type="button" title="Lukk" aria-label="Lukk"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.5 6.5 17.5 17.5"></path><path d="M17.5 6.5 6.5 17.5"></path></svg></button>
      </header>
      <div class="modal-body menu-body" id="group-modal-body">
        <div class="modal-current" id="group-current" hidden>
          <span class="current-label">Du er i</span>
          <span class="chip current-chip" id="group-current-chip">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5 19V6.5a2 2 0 0 1 2-2h3.3a2 2 0 0 1 1.6.8l1.1 1.5a2 2 0 0 0 1.6.8H19a2 2 0 0 1 2 2V19a2 2 0 0 1-2 2H5.5a2 2 0 0 1-2-2Z" fill="#adad85"></path></svg>
            <span class="chip-name" id="group-current-name"></span>
          </span>
          <button class="share-btn" id="share-group-btn" type="button" title="Del gruppen" aria-label="Del gruppen" hidden><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6.5" cy="12" r="3.2" fill="#ad8585"></circle><circle cx="17.5" cy="6" r="2.3" fill="#adad85"></circle><circle cx="17.5" cy="18" r="2.3" fill="#85ad85"></circle><path d="m9.4 10.4 5.3-3"></path><path d="m9.4 13.6 5.3 3"></path></svg><span>Del gruppen</span></button>
        </div>
        <hr class="menu-divider" />
        <div class="panel-head">
          <span class="panel-title">
            <span class="panel-title-text">Alle grupper i</span>
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12A9 9 0 0 1 12 3A14 14 0 0 0 8.2 12Z" fill="#ad8585" stroke="none"></path><path d="M8.2 12A14 14 0 0 1 12 3A14 14 0 0 1 15.8 12Z" fill="#adad85" stroke="none"></path><path d="M15.8 12A14 14 0 0 0 12 3A9 9 0 0 1 21 12Z" fill="#85ad85" stroke="none"></path><path d="M3 12A9 9 0 0 0 12 21A14 14 0 0 1 8.2 12Z" fill="#85adad" stroke="none"></path><path d="M8.2 12A14 14 0 0 0 12 21A14 14 0 0 0 15.8 12Z" fill="#8585ad" stroke="none"></path><path d="M15.8 12A14 14 0 0 1 12 21A9 9 0 0 0 21 12Z" fill="#ad85ad" stroke="none"></path><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18"></path><path d="M12 3a14 14 0 0 1 3.8 9 14 14 0 0 1-3.8 9 14 14 0 0 1-3.8-9A14 14 0 0 1 12 3Z"></path></svg>
            <span class="panel-title-name" id="group-modal-uni-name">universet</span>
          </span>
        </div>
        <div class="modal-list" id="group-list" role="tablist" aria-label="Grupper"></div>
        <div class="panel-actions">
          <button class="btn-add btn-solid btn-green" id="add-group-btn" type="button" title="Ny gruppe" aria-label="Ny gruppe"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4.5v15"></path><path d="M4.5 12h15"></path></svg> <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5 19V6.5a2 2 0 0 1 2-2h3.3a2 2 0 0 1 1.6.8l1.1 1.5a2 2 0 0 0 1.6.8H19a2 2 0 0 1 2 2V19a2 2 0 0 1-2 2H5.5a2 2 0 0 1-2-2Z" fill="#adad85"></path></svg></button>
          <button class="trashcan" id="groups-trash-btn" type="button"
                  title="Slettede grupper – trykk for å åpne, hold og sveip for å tømme"
                  aria-label="Slettede grupper" hidden>
            <svg class="icon trashcan-icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.3 7.5l.9 11a2 2 0 0 0 2 1.9h5.6a2 2 0 0 0 2-1.9l.9-11" fill="#c0c4c9" stroke="none"></path><path d="M4.5 7.5h15"></path><path d="M9.5 7.5V6a2.5 2.5 0 0 1 5 0v1.5"></path><path d="M6.3 7.5l.9 11a2 2 0 0 0 2 1.9h5.6a2 2 0 0 0 2-1.9l.9-11"></path><path d="M9.7 11v6"></path><path d="M12 11v6"></path><path d="M14.3 11v6"></path></svg>
            <span class="trashcan-count" id="groups-trash-count">0</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Konto-modal (kontoknappen øverst til høyre): profil med endring av navn
       og e-post, e-postvarsel-innstilling, invitasjons-innboks og logg ut. -->
  <div class="modal-overlay" id="account-modal" hidden>
    <div class="modal menu-modal" role="dialog" aria-modal="true" aria-labelledby="account-title">
      <header class="modal-head">
        <h2 id="account-title"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="3.4" fill="#85adad"></circle><path d="M5.5 20a6.5 6.5 0 0 1 13 0" fill="#85adad"></path></svg><span>Konto</span></h2>
        <button class="icon-btn" id="account-close" type="button" title="Lukk" aria-label="Lukk"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.5 6.5 17.5 17.5"></path><path d="M17.5 6.5 6.5 17.5"></path></svg></button>
      </header>
      <div class="modal-body menu-body">
        <div class="menu-account" id="menu-account" hidden>
          <span class="account-avatar" id="account-avatar" aria-hidden="true"></span>
          <span class="account-email" id="account-email"></span>
        </div>

        <!-- Endre navn / e-post (lagres på kontoen; ny e-post bekreftes per e-post). -->
        <section class="account-edit" id="account-edit" hidden>
          <form class="account-form" id="account-name-form">
            <label class="account-form-label" for="account-name-input">Navn</label>
            <div class="account-form-row">
              <input class="field" id="account-name-input" type="text" autocomplete="name" placeholder="Fornavn Etternavn" />
              <button class="btn btn-solid btn-green btn-small" type="submit">Lagre</button>
            </div>
          </form>
          <form class="account-form" id="account-email-form">
            <label class="account-form-label" for="account-email-input">E-post</label>
            <div class="account-form-row">
              <input class="field" id="account-email-input" type="email" autocomplete="email" placeholder="deg@eksempel.no" />
              <button class="btn btn-solid btn-green btn-small" type="submit">Lagre</button>
            </div>
          </form>
          <p class="account-msg" id="account-msg" role="status" hidden></p>
        </section>

        <!-- Innstilling: e-postvarsel når noe deles med meg (lagres på kontoen). -->
        <div class="menu-setting" id="menu-email-pref" hidden>
          <span class="menu-setting-label">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2.5" fill="#ffffff"></rect><path d="m3.5 7 7.2 5.6a2 2 0 0 0 2.6 0L20.5 7"></path></svg>
            <span>Varsle meg på e-post når noe deles med meg</span>
          </span>
          <button class="toggle-switch" id="email-pref-toggle" type="button" role="switch" aria-checked="true" aria-label="E-postvarsler ved deling">
            <span class="toggle-knob" aria-hidden="true"></span>
          </button>
        </div>

        <!-- Innboks: mottatte delings-invitasjoner -->
        <section class="menu-invites" id="menu-invites" hidden>
          <hr class="menu-divider" />
          <div class="panel-head">
            <span class="panel-title">Invitasjoner</span>
          </div>
          <div class="invite-list" id="invite-list"></div>
        </section>

        <hr class="menu-divider" />
        <button class="btn btn-solid btn-red btn-small menu-logout" id="logout-btn" type="button" title="Logg ut">
          <svg class="icon logout-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 3H6a2.5 2.5 0 0 0-2.5 2.5v13A2.5 2.5 0 0 0 6 21h3"></path><path d="M21 12H10"></path><path d="M17.5 8.5 21 12l-3.5 3.5"></path></svg>
          Logg ut
        </button>
      </div>
    </div>
  </div>

  <!-- Søppelkasse-modal (felles for universer/grupper/lister/listepunkter) -->
  <div class="modal-overlay" id="trash-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="trash-title">
      <header class="modal-head">
        <h2 id="trash-title">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.3 7.5l.9 11a2 2 0 0 0 2 1.9h5.6a2 2 0 0 0 2-1.9l.9-11" fill="#c0c4c9" stroke="none"></path><path d="M4.5 7.5h15"></path><path d="M9.5 7.5V6a2.5 2.5 0 0 1 5 0v1.5"></path><path d="M6.3 7.5l.9 11a2 2 0 0 0 2 1.9h5.6a2 2 0 0 0 2-1.9l.9-11"></path><path d="M9.7 11v6"></path><path d="M12 11v6"></path><path d="M14.3 11v6"></path></svg>
          <span id="trash-title-text">Søppelkasse</span>
        </h2>
        <button class="icon-btn" id="trash-close" type="button" title="Lukk" aria-label="Lukk"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.5 6.5 17.5 17.5"></path><path d="M17.5 6.5 6.5 17.5"></path></svg></button>
      </header>
      <div class="modal-body" id="trash-list"></div>
      <footer class="modal-foot">
        <p class="modal-note" id="trash-note"></p>
        <button class="btn btn-solid btn-red" id="trash-empty" type="button">Tøm permanent</button>
      </footer>
    </div>
  </div>

  <!-- Ansvarlig-velger for listepunkter i delte lister: popover (desktop) / modal
       (mobil), à la univers-/gruppebytteren. Bygges i openResponsible(). -->
  <div class="switcher-overlay" id="resp-switcher" hidden>
    <div class="switcher-panel resp-panel" id="resp-switcher-panel" role="listbox" aria-label="Velg ansvarlig" tabindex="-1"></div>
  </div>

  <!-- Templates -->
  <template id="group-template">
    <div class="group-card chip" role="tab" tabindex="0">
      <span class="share-badge" hidden aria-hidden="true"></span>
      <span class="group-name chip-name" title="Klikk for å bytte gruppe"></span>
      <span class="group-count chip-count" aria-hidden="true"></span>
      <button class="icon-btn group-delete" title="Slett gruppe" aria-label="Slett gruppe"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.5 6.5 17.5 17.5"></path><path d="M17.5 6.5 6.5 17.5"></path></svg></button>
    </div>
  </template>

  <template id="uni-template">
    <div class="uni-row chip" role="button" tabindex="0">
      <span class="share-badge" hidden aria-hidden="true"></span>
      <span class="uni-name chip-name" title="Klikk for å bytte univers"></span>
      <span class="uni-count chip-count" aria-hidden="true"></span>
      <button class="icon-btn uni-delete" title="Slett univers" aria-label="Slett univers"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.5 6.5 17.5 17.5"></path><path d="M17.5 6.5 6.5 17.5"></path></svg></button>
    </div>
  </template>

  <template id="card-template">
    <article class="card" tabindex="-1">
      <header class="card-head">
        <div class="card-title-wrap">
          <div class="title-line">
            <h2 class="card-title" title="Klikk for å endre navn"></h2>
            <span class="collapse-count" aria-hidden="true" hidden></span>
          </div>
          <div class="meta-row card-meta" hidden></div>
        </div>
        <button class="card-cog" type="button" title="Innstillinger for listen" aria-label="Innstillinger for listen"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.56 5.76 L10.44 3.14 L13.56 3.14 L13.44 5.76 A6.4 6.4 0 0 1 15.39 6.57 L17.16 4.63 L19.37 6.84 L17.43 8.61 A6.4 6.4 0 0 1 18.24 10.56 L20.86 10.44 L20.86 13.56 L18.24 13.44 A6.4 6.4 0 0 1 17.43 15.39 L19.37 17.16 L17.16 19.37 L15.39 17.43 A6.4 6.4 0 0 1 13.44 18.24 L13.56 20.86 L10.44 20.86 L10.56 18.24 A6.4 6.4 0 0 1 8.61 17.43 L6.84 19.37 L4.63 17.16 L6.57 15.39 A6.4 6.4 0 0 1 5.76 13.44 L3.14 13.56 L3.14 10.44 L5.76 10.56 A6.4 6.4 0 0 1 6.57 8.61 L4.63 6.84 L6.84 4.63 L8.61 6.57 A6.4 6.4 0 0 1 10.56 5.76 Z M8.8 12a3.2 3.2 0 1 0 6.4 0 3.2 3.2 0 1 0 -6.4 0Z" fill="#c0c4c9" fill-rule="evenodd"></path></svg></button>
        <button class="icon-btn card-delete" title="Slett liste" aria-label="Slett liste"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.5 6.5 17.5 17.5"></path><path d="M17.5 6.5 6.5 17.5"></path></svg></button>
      </header>
      <!-- Alt under headeren ligger i .card-body så den kan kollapses som en
           rullgardin (samme collapse/expand-mønster som kategorier). -->
      <div class="card-body">
        <ul class="items-container"></ul>
        <div class="items-done-wrap" hidden>
          <div class="done-divider"><span>Utført</span></div>
          <ul class="items-done"></ul>
        </div>
        <form class="add-item-form">
          <input class="add-item-input" type="text" placeholder="Legg til …" aria-label="Nytt listepunkt" autocomplete="off" />
          <button class="btn-add btn-solid btn-green icon-only add-item-btn" type="submit" title="Legg til listepunkt" aria-label="Legg til listepunkt"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4.5v15"></path><path d="M4.5 12h15"></path></svg></button>
          <button class="btn-add btn-solid btn-yellow icon-only add-cat-btn" type="button" title="Legg til kategori" aria-label="Legg til kategori"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8.5 4.5H6.5a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2H8.5"></path><circle cx="12.5" cy="8" r="0.8" fill="#111" stroke="none"></circle><path d="M15 8h4.5"></path><circle cx="12.5" cy="12" r="0.8" fill="#111" stroke="none"></circle><path d="M15 12h4.5"></path><circle cx="12.5" cy="16" r="0.8" fill="#111" stroke="none"></circle><path d="M15 16h4.5"></path></svg></button>
        </form>
      </div>
    </article>
  </template>

  <template id="item-template">
    <li class="item">
      <button class="item-check" type="button" title="Merk som gjort" aria-label="Merk som gjort" aria-pressed="false"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12.5l4 4L19 6.5"></path></svg></button>
      <div class="item-main">
        <span class="item-text" title="Klikk for å redigere"></span>
        <div class="meta-row item-meta" hidden></div>
      </div>
      <button class="item-cog" type="button" title="Innstillinger for listepunktet" aria-label="Innstillinger for listepunktet"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.56 5.76 L10.44 3.14 L13.56 3.14 L13.44 5.76 A6.4 6.4 0 0 1 15.39 6.57 L17.16 4.63 L19.37 6.84 L17.43 8.61 A6.4 6.4 0 0 1 18.24 10.56 L20.86 10.44 L20.86 13.56 L18.24 13.44 A6.4 6.4 0 0 1 17.43 15.39 L19.37 17.16 L17.16 19.37 L15.39 17.43 A6.4 6.4 0 0 1 13.44 18.24 L13.56 20.86 L10.44 20.86 L10.56 18.24 A6.4 6.4 0 0 1 8.61 17.43 L6.84 19.37 L4.63 17.16 L6.57 15.39 A6.4 6.4 0 0 1 5.76 13.44 L3.14 13.56 L3.14 10.44 L5.76 10.56 A6.4 6.4 0 0 1 6.57 8.61 L4.63 6.84 L6.84 4.63 L8.61 6.57 A6.4 6.4 0 0 1 10.56 5.76 Z M8.8 12a3.2 3.2 0 1 0 6.4 0 3.2 3.2 0 1 0 -6.4 0Z" fill="#c0c4c9" fill-rule="evenodd"></path></svg></button>
      <button class="icon-btn item-delete" title="Slett listepunkt" aria-label="Slett listepunkt"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.5 6.5 17.5 17.5"></path><path d="M17.5 6.5 6.5 17.5"></path></svg></button>
    </li>
  </template>

  <!-- Kategori: nivå-1-rad i en liste som grupperer listepunkter (nivå 2) under en
       felles overskrift. Tittel/meta + innstillinger (tannhjul) + oppløs-knapp i
       headeren; listepunktene ligger i .cat-items (indent-linje). Overskriftslinjen
       (unntatt de to knappene) er trykk-og-hold-sonen for kategori-draging. -->
  <template id="category-template">
    <li class="category">
      <div class="cat-head">
        <span class="cat-drag-icon" aria-hidden="true"></span>
        <div class="cat-title-wrap">
          <div class="title-line">
            <h3 class="cat-title" title="Klikk for å endre navn"></h3>
            <span class="collapse-count" aria-hidden="true" hidden></span>
          </div>
          <div class="meta-row cat-meta" hidden></div>
        </div>
        <button class="cat-cog" type="button" title="Innstillinger for kategorien" aria-label="Innstillinger for kategorien"></button>
        <button class="cat-dissolve" type="button" title="Oppløs kategorien" aria-label="Oppløs kategorien"></button>
      </div>
      <ul class="cat-items"></ul>
      <!-- Grønn ＋-knapp nederst i kategorien: legger til et nytt listepunkt
           direkte i kategorien (navneinputen blank + fokusert straks). -->
      <div class="cat-add">
        <button class="cat-add-btn btn-add btn-solid btn-green icon-only" type="button" title="Legg til listepunkt i kategorien" aria-label="Legg til listepunkt i kategorien"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4.5v15"></path><path d="M4.5 12h15"></path></svg></button>
      </div>
    </li>
  </template>

  <!-- Innstillingsmodal (liste/listepunkt): navn, deling (lister), ansvarlig og
       tidsplan (start/frist). Bygges i openSettings() — alt lagres fortløpende
       (optimistisk, via doc-synken/operasjonskøen), ingen bekreftelsesknapp. -->
  <div class="modal-overlay" id="settings-modal" hidden>
    <div class="modal settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <header class="modal-head">
        <h2 id="settings-title">Innstillinger</h2>
        <button class="icon-btn" id="settings-close" type="button" title="Lukk" aria-label="Lukk"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.5 6.5 17.5 17.5"></path><path d="M17.5 6.5 6.5 17.5"></path></svg></button>
      </header>
      <div class="modal-body settings-body" id="settings-body"></div>
    </div>
  </div>

  <!-- Tids-popover: rask redigering av start/frist fra indikator-chipene
       (popover på desktop / sentrert modal på mobil, samme skall som bytterne).
       Bygges i openTimeQuick(). -->
  <div class="switcher-overlay" id="time-switcher" hidden>
    <div class="switcher-panel time-panel" id="time-switcher-panel" role="dialog" aria-label="Endre tid" tabindex="-1"></div>
  </div>

  <!-- Del-modal: eier inviterer, ser medlemmer/ventende, kaster ut, låser (fase 2).
       Mottaker ser eier + låst-status + «Forlat deling». Brukes for univers/
       gruppe; listers deling ligger i innstillingsmodalen. Tilbakeknappen
       (vises kun når modalen ble åpnet fra univers-/gruppe-modalen) navigerer
       tilbake dit; ✕/overlay lukker helt (tilbake til hovedsiden). -->
  <div class="modal-overlay" id="share-modal" hidden>
    <div class="modal share-modal" role="dialog" aria-modal="true" aria-labelledby="share-title">
      <header class="modal-head">
        <button class="icon-btn share-back" id="share-back" type="button" title="Tilbake" aria-label="Tilbake" hidden><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 12H4.5"></path><path d="M11 5.5 4.5 12l6.5 6.5"></path></svg></button>
        <h2 id="share-title">Del</h2>
        <button class="icon-btn" id="share-close" type="button" title="Lukk" aria-label="Lukk"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.5 6.5 17.5 17.5"></path><path d="M17.5 6.5 6.5 17.5"></path></svg></button>
      </header>
      <div class="modal-body share-body" id="share-body"></div>
    </div>
  </div>

  <!-- Plasserings-modal: mottaker velger hvor et delt objekt skal ligge (fase 2). -->
  <div class="modal-overlay" id="place-modal" hidden>
    <div class="modal place-modal" role="dialog" aria-modal="true" aria-labelledby="place-title">
      <header class="modal-head">
        <h2 id="place-title">Velg plassering</h2>
        <button class="icon-btn" id="place-close" type="button" title="Lukk" aria-label="Lukk"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.5 6.5 17.5 17.5"></path><path d="M17.5 6.5 6.5 17.5"></path></svg></button>
      </header>
      <div class="modal-body" id="place-body"></div>
    </div>
  </div>

  <!-- Felles bekreftelses-modal (erstatter native confirm()): app-stilt ja/nei. -->
  <div class="modal-overlay" id="confirm-modal" hidden>
    <div class="modal confirm-modal" role="alertdialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-msg">
      <header class="modal-head">
        <h2 id="confirm-title">Bekreft</h2>
      </header>
      <div class="modal-body">
        <p class="confirm-msg" id="confirm-msg"></p>
      </div>
      <footer class="modal-foot confirm-foot">
        <button class="btn btn-ghost" id="confirm-cancel" type="button">Avbryt</button>
        <button class="btn btn-solid btn-red" id="confirm-ok" type="button">OK</button>
      </footer>
    </div>
  </div>

  <!-- Innlogging med konto (e-post + passord): registrering, innlogging, glemt
       passord, «sjekk innboksen» (fase 2). Vises til man er logget inn. -->
  <div class="auth-screen" id="auth-screen" hidden>
    <div class="auth-box">
      <div class="lock-brand"><span class="brand-mark"><svg class="brand-logo" viewBox="0 0 24 24" aria-hidden="true"><g fill="none" stroke="#111" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3.3" y="3.3" width="11.4" height="11.4" rx="2.8" fill="#85ad85"></rect><rect x="6.3" y="6.3" width="11.4" height="11.4" rx="2.8" fill="#adad85"></rect><rect x="9.3" y="9.3" width="11.4" height="11.4" rx="2.8" fill="#ad8585"></rect></g><g fill="#111" stroke="none"><circle cx="12.4" cy="12.9" r="0.6"></circle><circle cx="12.4" cy="15" r="0.6"></circle><circle cx="12.4" cy="17.1" r="0.6"></circle></g><g fill="none" stroke="#111" stroke-width="0.9" stroke-linecap="round"><path d="M14.3 12.9h3.9"></path><path d="M14.3 15h3.9"></path><path d="M14.3 17.1h3.9"></path></g></svg></span> Huskis</div>

      <form class="auth-form" id="auth-form" autocomplete="on">
        <h1 class="auth-title">
          <span id="auth-heading-icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h3a2.5 2.5 0 0 1 2.5 2.5v13A2.5 2.5 0 0 1 18 21h-3" fill="#ffffff"></path><path d="M3 12h11"></path><path d="M10.5 8.5 14 12l-3.5 3.5"></path></svg></span>
          <span id="auth-heading">Logg inn</span>
        </h1>
        <div class="auth-name-row" id="auth-name-fields" hidden>
          <label class="auth-field">
            <span>Fornavn</span>
            <input class="field" type="text" id="auth-first-name" autocomplete="given-name"
                   placeholder="Fornavn" />
          </label>
          <label class="auth-field">
            <span>Etternavn</span>
            <input class="field" type="text" id="auth-last-name" autocomplete="family-name"
                   placeholder="Etternavn" />
          </label>
        </div>
        <label class="auth-field">
          <span>E-post</span>
          <input class="field" type="email" id="auth-email" autocomplete="email" required
                 placeholder="deg@eksempel.no" />
        </label>
        <label class="auth-field" id="auth-pass-field">
          <span>Passord</span>
          <input class="field" type="password" id="auth-password" autocomplete="current-password"
                 minlength="6" placeholder="Minst 6 tegn" />
        </label>
        <p class="auth-msg" id="auth-msg" role="status"></p>
        <button class="btn btn-solid btn-green auth-submit" id="auth-submit" type="submit">Logg inn</button>
        <div class="auth-links" id="auth-links">
          <button type="button" class="auth-link" data-mode="register">Ny bruker? Registrer deg</button>
          <button type="button" class="auth-link" data-mode="forgot">Glemt passord?</button>
        </div>
      </form>

      <!-- «Sjekk innboksen»-visning etter registrering / glemt-passord -->
      <div class="auth-sent" id="auth-sent" hidden>
        <div class="auth-sent-icon" aria-hidden="true"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5" fill="#ffffff"></rect><path d="m3.5 7 7.2 5.6a2 2 0 0 0 2.6 0L20.5 7"></path></svg></div>
        <p class="auth-sent-msg" id="auth-sent-msg"></p>
        <button class="btn btn-ghost" id="auth-sent-back" type="button">Tilbake til innlogging</button>
      </div>
    </div>
  </div>

  <!-- Sky-synk (Supabase). Biblioteket lastes fra CDN; config.js holder dine verdier. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <!-- Mock-backend for hermetisk to-bruker-testing: aktiveres kun med ?mock=1. -->
  <script>
    if (/[?&]mock=1/.test(location.search)) document.write('<script src="mock-backend.js"><\/script>');
  </script>
  <script src="icons.js"></script>
  <script src="app.js"></script>
</body>
</html>
